# Air configuration for Go live reload
root = "."
tmp_dir = "tmp"

[build]
bin = "./tmp/waxon"
cmd = "go build -o ./tmp/waxon ./cmd/waxon"
delay = 500
exclude_dir = ["tmp", "dist", "swarf", "node_modules"]
exclude_regex = ["_test\\.go$"]
include_ext = ["go"]
kill_delay = "1s"
log = "build-errors.log"
send_interrupt = true
stop_on_error = true

[log]
time = false

[misc]
clean_on_exit = true
