version: 2
project_name: waxon
dist: dist/goreleaser

before:
  hooks:
    - go mod tidy

builds:
  - id: waxon
    main: ./cmd/waxon
    binary: waxon
    ldflags:
      - -s -w
      - -X github.com/mschulkind-oss/waxon/internal/version.Version={{.Version}}
      - -X github.com/mschulkind-oss/waxon/internal/version.GitCommit={{.ShortCommit}}
      - -X github.com/mschulkind-oss/waxon/internal/version.Dirty=false
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "waxon-{{ .Version }}-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: mschulkind-oss
    name: waxon
  draft: false
  prerelease: auto

brews:
  - name: waxon
    repository:
      owner: mschulkind-oss
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/mschulkind-oss/waxon"
    description: "A slide deck toolkit built for the mind meld between human and agent"
    license: "MIT"
    directory: Formula
    install: |
      bin.install "waxon"
    test: |
      system "#{bin}/waxon", "--version"
