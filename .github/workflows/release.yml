name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  publish-npm:
    needs: goreleaser
    runs-on: ubuntu-latest
    # npm trusted publishing — configure at npmjs.com/package/waxon/access
    # No NPM_TOKEN needed; OIDC handles auth via trusted publisher
    permissions:
      contents: read
      id-token: write  # Required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Ensure npm >= 11.5.1 for trusted publishing
        run: |
          # Node 24 ships with npm 11.x. Verify it meets the OIDC requirement.
          npm --version
          npx --yes semver -r ">=11.5.1" "$(npm --version)" || \
            npm install -g --force npm@11.5.1

      - name: Set version in package.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd dist/npm
          jq --arg v "$VERSION" '.version = $v' package.json > tmp.json && mv tmp.json package.json

      - name: Copy README and LICENSE
        run: |
          cp README.md dist/npm/
          cp LICENSE dist/npm/

      - name: Publish to npm
        run: |
          cd dist/npm
          mkdir -p bin
          npm publish --provenance --access public

  publish-pypi:
    needs: goreleaser
    runs-on: ubuntu-latest
    # PyPI trusted publishing — configure at pypi.org/manage/project/<name>/settings/publishing/
    # No PyPI token needed; OIDC handles auth
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5

      - name: Copy README and LICENSE
        run: |
          cp README.md dist/pypi/
          cp LICENSE dist/pypi/

      - name: Build package
        run: |
          cd dist/pypi
          uv build

      - name: Publish to PyPI
        run: |
          cd dist/pypi
          uv publish dist/* --check-url https://pypi.org/simple/

